specVersion: 1.0.0
description: Helios — Arbitrum Sepolia execution surface (Phase 5 / WS6).
repository: https://github.com/helios-market/helios
schema:
  file: ./schema.graphql

# Phase 5 / WS6 — Arbitrum Sepolia subgraph. Yield rotation is the
# only class executing here; the YR-specific event handler is wired
# alongside the canonical Trade/NAV set so rotation receipts feed both
# `Trade` (for §8.2 trade volume) and `YieldRotation` (for the audit
# page rotation timeline).
#
# Addresses + startBlock are sentinels; replaced after WS2 broadcast
# writes `contracts/deployments/arbitrum-sepolia.json`. Goldsky deploy
# is gated until that broadcast lands.

dataSources:
  - kind: ethereum
    name: StrategyVault
    network: arbitrum-sepolia
    source:
      address: "0x000000000000000000000000000000000000dEaD"
      abi: StrategyVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/strategy-vault.ts
      entities:
        - Trade
        - YieldRotation
        - NAVSnapshot
        - Strategy
      abis:
        - name: StrategyVault
          file: ./abis/StrategyVault.json
      eventHandlers:
        - event: TradeAttested(indexed address,indexed address,indexed bytes32,bytes32,address,address,uint256,uint256,uint8,uint64,uint64)
          handler: handleTradeAttested
        - event: NAVReported(indexed address,uint256,uint64)
          handler: handleNAVReported
        - event: Slashed(indexed address,uint256,string)
          handler: handleSlashed
        - event: YieldRotationAttested(indexed address,indexed address,indexed bytes32,bytes32,uint256,uint256,uint256,bytes32,uint64,uint64)
          handler: handleYieldRotationAttested

  - kind: ethereum
    name: HeliosOApp
    network: arbitrum-sepolia
    source:
      address: "0x000000000000000000000000000000000000dEaD"
      abi: HeliosOApp
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/helios-oapp.ts
      entities:
        - CrossChainReputationMessage
      abis:
        - name: HeliosOApp
          file: ./abis/HeliosOApp.json
      eventHandlers:
        - event: AttestationQueued(indexed address,indexed uint64,uint256)
          handler: handleAttestationQueued
        - event: AttestationsFlushed(indexed uint32,uint256,uint64,uint64,bytes32)
          handler: handleAttestationsFlushed
        - event: ReputationMessageSent(indexed uint32,indexed address,uint8,bytes32)
          handler: handleReputationMessageSent
