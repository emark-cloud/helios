# Helios subgraph schema — Phase 0 skeleton aligned to the event shapes in
# contracts/src/interfaces/. The Reputation Engine, Sentinel, Helix, and the
# frontend all read from this. Phase 1 fills mappings against the deployed
# vault + registry contracts.

type User @entity {
  id: Bytes!                      # user address
  createdAt: BigInt!
  metaStrategyHash: Bytes
  allocator: Allocator
  deposits: [Deposit!]! @derivedFrom(field: "user")
  allocations: [Allocation!]! @derivedFrom(field: "user")
}

type Deposit @entity(immutable: true) {
  id: Bytes!                      # tx hash + log index
  user: User!
  asset: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type Allocator @entity {
  id: Bytes!                      # allocator contract address
  name: String!
  operator: Bytes!
  feeRateBps: Int!
  stakeAmount: BigInt!
  isReferenceBrand: Boolean!
  active: Boolean!
  registeredAt: BigInt!
  totalUsers: Int!
  totalCapitalManaged: BigInt!
  currentReputation: BigInt!
  users: [User!]! @derivedFrom(field: "allocator")
  allocations: [Allocation!]! @derivedFrom(field: "allocator")
  # Phase 3 / WS5.B reverse refs.
  delegations: [UserDelegation!]! @derivedFrom(field: "allocator")
  decisions: [AllocatorDecision!]! @derivedFrom(field: "allocator")
  reputationUpdates: [AllocatorReputationUpdate!]! @derivedFrom(field: "allocator")
}

# Phase 3 / WS5.B — Per-(user, allocator) delegation snapshot. The
# reputation engine reads this to aggregate users + capital under
# management for the allocator score (`docs/reputation-math.md
# §"Allocator reputation v1"`). One row per pair, upserted on each
# allocation event.
#
# Per `project_subgraph_bigint_limitation.md`, `capital` is the
# most-recent allocation amount (NOT a running sum). Consumers
# aggregate live capital by summing per-strategy `Allocation` rows at
# query time. `since` carries the first AllocationCreated timestamp;
# `defundedAt` flips to non-null on a StrategyDefunded event and
# resets to null if the user re-allocates afterwards.
type UserDelegation @entity {
  id: Bytes!                      # keccak(user || allocator)
  user: User!
  allocator: Allocator!
  capital: BigInt!
  since: BigInt!
  defundedAt: BigInt
}

# Phase 3 / WS5.B — Append-only audit log of allocator-driven
# capital moves. The frontend renders this on `/allocators/[name]`
# (recent decisions table). The reputation engine windows by
# `timestamp` for drawdown-discipline (DEFUND with drawdown reason)
# and routing-cadence stats.
type AllocatorDecision @entity(immutable: true) {
  id: Bytes!                      # tx hash + log index
  allocator: Allocator!
  user: User
  strategy: Strategy
  kind: String!                   # "ALLOCATE" | "DEFUND" | "REBALANCE_INCREASE" | "REBALANCE_DECREASE"
  amount: BigInt!
  reason: String                  # only set when kind == DEFUND
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Phase 3 / WS5.B — Append-only allocator reputation history. Mirrors
# `ReputationSnapshot` for strategies but keyed by allocator-event so
# the audit page can correlate score movement with the
# `AllocatorDecision` timeline. Emitted on every
# `AllocatorRegistry.AllocatorReputationUpdated`.
type AllocatorReputationUpdate @entity(immutable: true) {
  id: Bytes!                      # tx hash + log index
  allocator: Allocator!
  delta: BigInt!                  # signed
  newScore: BigInt!               # signed
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type Strategy @entity {
  id: Bytes!                      # strategy contract address
  operator: Bytes!
  declaredClass: String!
  chainId: Int!
  stakeAmount: BigInt!
  feeRateBps: Int!
  maxCapacity: BigInt!
  active: Boolean!
  registeredAt: BigInt!
  currentReputation: BigInt!
  totalRealizedPnL: BigInt!
  totalAttestedTrades: Int!
  maxDrawdownBps: Int!
  trades: [Trade!]! @derivedFrom(field: "strategy")
  yieldRotations: [YieldRotation!]! @derivedFrom(field: "strategy")
  navSnapshots: [NAVSnapshot!]! @derivedFrom(field: "strategy")
  allocations: [Allocation!]! @derivedFrom(field: "strategy")
  paramsRotations: [ParamsRotation!]! @derivedFrom(field: "strategy")
  paramsCommitments: [ParamsCommitment!]! @derivedFrom(field: "strategy")
  paramsRotationProposals: [ParamsRotationProposal!]! @derivedFrom(field: "strategy")
  paramsRotationCancellations: [ParamsRotationCancellation!]! @derivedFrom(field: "strategy")
}

# Emitted by `StrategyRegistry.completeParamsRotation` — the only path
# that mutates a strategy's canonical paramsHash (Helios.md §6.5). The
# reputation engine reads the most-recent timestamp via
# `Strategy.paramsRotations` to reset AgeScore + PerformanceScore on the
# new params slot (§8.7); allocators surface the rotation timeline in
# the audit page so capital decisions can react to a clean break.
type ParamsRotation @entity(immutable: true) {
  id: Bytes!                      # tx hash + log index
  strategy: Strategy!
  oldHash: Bytes!
  newHash: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type Allocation @entity {
  id: Bytes!                      # keccak(user + allocator + strategy)
  user: User!
  allocator: Allocator!
  strategy: Strategy!
  # IMPORTANT: per-event amount, NOT a running total. graph-ts strict-null
  # fights BigInt accumulation, so consumers must aggregate at query time
  # by summing across allocation events. See
  # project_subgraph_bigint_limitation.md and subgraph/src/allocator-vault.ts.
  capitalDeployed: BigInt!
  strategyHighWaterMark: BigInt!
  lastRebalanceAt: BigInt!
  defundedAt: BigInt
  defundReason: String
}

type Trade @entity(immutable: true) {
  id: Bytes!                      # tx hash + log index
  strategy: Strategy!
  allocator: Allocator!
  chainId: Int!
  declaredClass: String!
  tradeHash: Bytes!
  proofValid: Boolean!
  assetIn: Bytes!
  assetOut: Bytes!
  amountIn: BigInt!
  minAmountOut: BigInt!
  direction: Int!
  blockWindowStart: BigInt!
  blockWindowEnd: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type NAVSnapshot @entity(immutable: true) {
  id: Bytes!
  strategy: Strategy!
  totalNAV: BigInt!
  timestamp: BigInt!
}

type ReputationSnapshot @entity(immutable: true) {
  id: Bytes!
  actor: Bytes!
  actorType: String!             # "STRATEGY" | "ALLOCATOR"
  score: BigInt!
  totalAttestedTrades: BigInt!
  totalRealizedPnL: BigInt!
  maxDrawdownBps: Int!
  proofValidityRateBps: Int!
  timestamp: BigInt!
  blockNumber: BigInt!
  # Anchor source — "V1" or "V2". V2 emits the typehash-v2 EIP-712
  # signature with `componentsHash` (paired `ComponentsAnchor` entity).
  source: String
}

# Phase 2 / WS3.A — `ReputationAnchorV2.ComponentsAnchored`. V2 emits
# this paired with each `ReputationPosted` so the audit page can verify
# the per-component breakdown (§8.2 sub-scores) the engine signed off
# matches what the UI re-derives. Joined to ReputationSnapshot by
# (actor, timestamp).
type ComponentsAnchor @entity(immutable: true) {
  id: Bytes!                      # tx hash + log index
  actor: Bytes!
  componentsHash: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Phase 2 / WS1.A — `OraclePriceAnchor.Committed`. EIP-712-signed
# append-only ledger of price-snapshot Poseidon roots. Circuits consume
# `root` directly via `priceAnchor.isKnownRoot(root)`. The audit page
# renders the timeline so an operator can prove the root used at trade
# time was committed before the trade landed.
type OraclePriceCommit @entity(immutable: true) {
  id: Bytes!                      # tx hash + log index
  index: BigInt!                  # monotonic on-chain index
  root: Bytes!
  windowStart: BigInt!
  windowEnd: BigInt!
  signer: Bytes!                  # recovered EIP-712 signer
  committedAt: BigInt!            # block timestamp at write
  txHash: Bytes!
}

# Phase 2 / WS1.A — `OracleYieldAnchor.Committed`. Mirrors
# OraclePriceCommit; YR circuit consumes the yield root via
# `yieldAnchor.isKnownRoot(root)`.
type OracleYieldCommit @entity(immutable: true) {
  id: Bytes!
  index: BigInt!
  root: Bytes!
  windowStart: BigInt!
  windowEnd: BigInt!
  signer: Bytes!
  committedAt: BigInt!
  txHash: Bytes!
}

type DefundEvent @entity(immutable: true) {
  id: Bytes!
  user: User!
  strategy: Strategy!
  reason: String!
  triggeredBy: Bytes!            # whoever called the permissionless defund
  capitalRecovered: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type CrossChainReputationMessage @entity(immutable: true) {
  id: Bytes!                      # LayerZero GUID
  srcEid: Int!
  dstEid: Int!
  actor: Bytes!
  actorType: String!
  score: BigInt!
  sentAt: BigInt!
  receivedAt: BigInt
}

type VerifierRegistration @entity(immutable: true) {
  id: Bytes!                      # tx hash + log index
  declaredClass: Bytes!           # bytes32 class id
  verifier: Bytes!                # adapter address
  registeredAt: BigInt!
  txHash: Bytes!
}

# Phase 2 / WS3.A — yield_rotation_v1 attestation. Distinct from `Trade`
# because the YR event surfaces market-rotation fields (mFrom/mTo,
# yieldOracleRoot, amountRotating) that don't fit the swap-shaped Trade
# entity. The reputation engine still gets a `Trade` row written
# alongside this so YR strategies count toward §8.2 trade volume — see
# `subgraph/src/strategy-vault.ts::handleYieldRotationAttested`.
type YieldRotation @entity(immutable: true) {
  id: Bytes!                      # tx hash + log index
  strategy: Strategy!
  allocator: Allocator!
  declaredClass: Bytes!           # bytes32
  tradeHash: Bytes!
  mFrom: BigInt!                  # source market id (uint256)
  mTo: BigInt!                    # destination market id (uint256)
  amountRotating: BigInt!
  yieldOracleRoot: Bytes!
  blockWindowStart: BigInt!
  blockWindowEnd: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

# Phase 2 — `StrategyRegistry.MarketAllowlistRootSet`. One row per
# class-level allowlist update. The audit page renders the timeline so
# operators can prove the allowlist used at trade-time matches the
# circuit's private witness. Keyed by tx + log to allow re-publishes.
type MarketAllowlistRoot @entity(immutable: true) {
  id: Bytes!
  declaredClass: Bytes!           # bytes32 class id
  root: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Phase 2 — `StrategyRegistry.ParamsHashCommitted`. Append-only history
# of `paramsHash` commits per strategy. The most-recent row reflects
# the canonical hash that proofs must bind through `trade_hash`.
type ParamsCommitment @entity(immutable: true) {
  id: Bytes!
  strategy: Strategy!
  paramsHash: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Phase 2 — `StrategyRegistry.ParamsRotationInitiated`. The cooldown
# slot is open between this event and either `ParamsRotated`
# (completed → existing `ParamsRotation` entity) or
# `ParamsRotationCancelled`. UI uses `unlockAt` to render a countdown.
type ParamsRotationProposal @entity(immutable: true) {
  id: Bytes!
  strategy: Strategy!
  oldHash: Bytes!
  newHash: Bytes!
  unlockAt: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Phase 2 — `StrategyRegistry.ParamsRotationCancelled`. Pairs with a
# preceding `ParamsRotationProposal` (same `newHash`); the audit page
# joins them by `(strategy, newHash)`.
type ParamsRotationCancellation @entity(immutable: true) {
  id: Bytes!
  strategy: Strategy!
  cancelledNewHash: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}
