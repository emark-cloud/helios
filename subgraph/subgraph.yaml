      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/strategy-registry.ts
      entities:
        - Strategy
        - ParamsRotation
      abis:
        - name: StrategyRegistry
          file: ./abis/StrategyRegistry.json
      eventHandlers:
        - event: StrategyRegistered(indexed address,indexed address,indexed address,bytes32,uint256)
          handler: handleStrategyRegistered
        - event: StrategyDeactivated(indexed address)
          handler: handleStrategyDeactivated
