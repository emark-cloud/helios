specVersion: 1.0.0
description: Helios — programmatic capital market for AI trading agents on Kite.
repository: https://github.com/helios-market/helios
schema:
  file: ./schema.graphql

# Phase 1 datasources for Kite testnet.
#
# Addresses bound 2026-04-27 from `contracts/deployments/kite-testnet.json`
# (Track B sign-off — chainId 2368, deployer
# 0xECf5e30F091D1db7c7b0ef26634a71d46DC9Bb25). startBlock = 21074384, the
# first block of the deploy broadcast (per
# `contracts/broadcast/DeployPhase1.s.sol/2368/run-latest.json`). When
# redeploying, regenerate from the deployments file and bump startBlock.
#
# StrategyVault datasources bind the three Phase-1 vaults (momentum,
# mean_reversion, yield_rotation). All three were deployed in the
# 2026-04-27 Track B run; expanded to all three in the Phase-2 followup
# (Critical #3) so the reputation engine sees mr + yr trades. Each
# datasource references the same `./src/strategy-vault.ts` mapping file
# — graph-codegen produces a per-datasource generated namespace, but
# the WASM handlers are structurally identical and dispatch on
# `event.params.strategy`.
#
# Phase 2's second-variant + fresh-momentum vaults, OraclePriceAnchor /
# OracleYieldAnchor, and ReputationAnchorV2 are *not* bound here yet —
# they only exist on local anvil (see `anvil-kite-phase2.json`). When
# `RegisterPhase2Strategies.s.sol` runs against Kite testnet (TODO.md
# row 231), drop those addresses into kite-testnet.json and add the
# datasources in a follow-up PR.
#
# Phase 5 will add `kite-mainnet`, `base-sepolia`, `arbitrum-sepolia`
# copies of each datasource plus the cross-chain `HeliosOApp` entry.

dataSources:
  - kind: ethereum
    name: StrategyRegistry
    network: kite-ai-testnet
    source:
      address: "0x3a0f5b9436eca0c8c0eced659dcc41e86e65e33d"
      abi: StrategyRegistry
      startBlock: 21074384
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/strategy-registry.ts
      entities:
        - Strategy
        - ParamsRotation
      abis:
        - name: StrategyRegistry
          file: ./abis/StrategyRegistry.json
      eventHandlers:
        - event: StrategyRegistered(indexed address,indexed address,indexed address,bytes32,uint256)
          handler: handleStrategyRegistered
        - event: StrategyDeactivated(indexed address)
          handler: handleStrategyDeactivated
        - event: ReputationUpdated(indexed address,int256,int256)
          handler: handleStrategyReputationUpdated
        - event: ParamsRotated(indexed address,bytes32,bytes32)
          handler: handleParamsRotated
        - event: MarketAllowlistRootSet(indexed bytes32,bytes32)
          handler: handleMarketAllowlistRootSet
        - event: ParamsHashCommitted(indexed address,bytes32)
          handler: handleParamsHashCommitted
        - event: ParamsRotationInitiated(indexed address,bytes32,bytes32,uint64)
          handler: handleParamsRotationInitiated
        - event: ParamsRotationCancelled(indexed address,bytes32)
          handler: handleParamsRotationCancelled

  - kind: ethereum
    name: AllocatorRegistry
    network: kite-ai-testnet
    source:
      address: "0xbfeba025ca32324a87c620a5c7c110c7666f417c"
      abi: AllocatorRegistry
      startBlock: 21074384
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/allocator-registry.ts
      entities:
        - Allocator
      abis:
        - name: AllocatorRegistry
          file: ./abis/AllocatorRegistry.json
      eventHandlers:
        - event: AllocatorRegistered(indexed address,string,indexed address,indexed address,bytes32,uint16,uint256)
          handler: handleAllocatorRegistered
        - event: AllocatorDeactivated(indexed address)
          handler: handleAllocatorDeactivated
        - event: AllocatorReputationUpdated(indexed address,int256,int256)
          handler: handleAllocatorReputationUpdated
        - event: ReferenceBrandAssigned(indexed address)
          handler: handleReferenceBrandAssigned

  - kind: ethereum
    name: ReputationAnchor
    network: kite-ai-testnet
    source:
      address: "0x51c07adf596b1e72697a9b8232d061ed006943dc"
      abi: ReputationAnchor
      startBlock: 21074384
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/reputation-anchor.ts
      entities:
        - ReputationSnapshot
        - Strategy
        - Allocator
      abis:
        - name: ReputationAnchor
          file: ./abis/ReputationAnchor.json
      eventHandlers:
        - event: ReputationPosted(indexed address,indexed uint8,int256,uint256)
          handler: handleReputationPosted
        - event: CrossChainReputationPosted(indexed address,indexed uint8,uint32,int256)
          handler: handleCrossChainReputationPosted

  # Momentum vault (Phase 1). Datasource name kept as `StrategyVault`
  # to avoid renaming the existing generated namespace consumers.
  - kind: ethereum
    name: StrategyVault
    network: kite-ai-testnet
    source:
      address: "0x818a782f040f09389e7c34b1e2e33188d473a950"
      abi: StrategyVault
      startBlock: 21074384
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/strategy-vault.ts
      entities:
        - Trade
        - NAVSnapshot
        - Strategy
      abis:
        - name: StrategyVault
          file: ./abis/StrategyVault.json
      eventHandlers:
        - event: TradeAttested(indexed address,indexed address,indexed bytes32,bytes32,address,address,uint256,uint256,uint8,uint64,uint64)
          handler: handleTradeAttested
        - event: NAVReported(indexed address,uint256,uint64)
          handler: handleNAVReported
        - event: Slashed(indexed address,uint256,string)
          handler: handleSlashed

  # Mean-reversion vault (Phase 1). Same ABI / same handlers as the
  # momentum datasource — codegen produces a sibling namespace and the
  # WASM handlers dispatch on `event.params.strategy`.
  - kind: ethereum
    name: StrategyVaultMeanReversion
    network: kite-ai-testnet
    source:
      address: "0x6c1f9466db7bc2364b0bac051e73421d5b75354b"
      abi: StrategyVault
      startBlock: 21074384
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/strategy-vault.ts
      entities:
        - Trade
        - NAVSnapshot
        - Strategy
      abis:
        - name: StrategyVault
          file: ./abis/StrategyVault.json
      eventHandlers:
        - event: TradeAttested(indexed address,indexed address,indexed bytes32,bytes32,address,address,uint256,uint256,uint8,uint64,uint64)
          handler: handleTradeAttested
        - event: NAVReported(indexed address,uint256,uint64)
          handler: handleNAVReported
        - event: Slashed(indexed address,uint256,string)
          handler: handleSlashed

  # Yield-rotation vault (Phase 1). Adds the YR-specific
  # `YieldRotationAttested` handler in addition to the standard set.
  - kind: ethereum
    name: StrategyVaultYieldRotation
    network: kite-ai-testnet
    source:
      address: "0xbfbf9fa82b5df3b080be27f64d650101ee69c36f"
      abi: StrategyVault
      startBlock: 21074384
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/strategy-vault.ts
      entities:
        - Trade
        - YieldRotation
        - NAVSnapshot
        - Strategy
      abis:
        - name: StrategyVault
          file: ./abis/StrategyVault.json
      eventHandlers:
        - event: TradeAttested(indexed address,indexed address,indexed bytes32,bytes32,address,address,uint256,uint256,uint8,uint64,uint64)
          handler: handleTradeAttested
        - event: NAVReported(indexed address,uint256,uint64)
          handler: handleNAVReported
        - event: Slashed(indexed address,uint256,string)
          handler: handleSlashed
        - event: YieldRotationAttested(indexed address,indexed address,indexed bytes32,bytes32,uint256,uint256,uint256,bytes32,uint64)
          handler: handleYieldRotationAttested

  - kind: ethereum
    name: AllocatorVault
    network: kite-ai-testnet
    source:
      address: "0xf3e4452fe17edbfa6833022b9c186aa14b98955d"
      abi: AllocatorVault
      startBlock: 21074384
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/allocator-vault.ts
      entities:
        - Allocation
        - DefundEvent
      abis:
        - name: AllocatorVault
          file: ./abis/AllocatorVault.json
      eventHandlers:
        - event: AllocationCreated(indexed address,indexed address,uint256,uint32)
          handler: handleAllocationCreated
        - event: AllocationIncreased(indexed address,indexed address,uint256)
          handler: handleAllocationIncreased
        - event: AllocationDecreased(indexed address,indexed address,uint256)
          handler: handleAllocationDecreased
        - event: StrategyDefunded(indexed address,indexed address,string,indexed address)
          handler: handleStrategyDefunded

  - kind: ethereum
    name: UserVault
    network: kite-ai-testnet
    source:
      address: "0x78b3515f4e9186d9870dcef02da58e4c8c5c6e8f"
      abi: UserVault
      startBlock: 21074384
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/user-vault.ts
      entities:
        - User
        - Deposit
      abis:
        - name: UserVault
          file: ./abis/UserVault.json
      eventHandlers:
        - event: MetaStrategySet(indexed address,indexed bytes32)
          handler: handleMetaStrategySet
        - event: Deposited(indexed address,indexed address,uint256)
          handler: handleDeposited
        - event: AllocatorDelegated(indexed address,indexed address,uint64,bytes32)
          handler: handleAllocatorDelegated

  - kind: ethereum
    name: TradeAttestationVerifier
    network: kite-ai-testnet
    source:
      address: "0x743e1bd7e9795e78b10965eaeaa93bf215476c96"
      abi: TradeAttestationVerifier
      startBlock: 21074384
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/trade-attestation-verifier.ts
      entities:
        - VerifierRegistration
      abis:
        - name: TradeAttestationVerifier
          file: ./abis/TradeAttestationVerifier.json
      eventHandlers:
        - event: VerifierRegistered(indexed bytes32,address)
          handler: handleVerifierRegistered
