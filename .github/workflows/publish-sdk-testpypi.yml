name: publish-sdk-testpypi

# Mirrors all four publishable Helios Python packages to test-PyPI on
# every `sdk-v*` tag via OIDC trusted publishing (no API tokens).
#
# Each package needs a one-time trusted-publisher registration on
# test.pypi.org pointing at this repo + this workflow file +
# environment `testpypi`. Status:
#   - helios-strategy-sdk   - registered (publishes since sdk-v0.1.0)
#   - helios-contracts-abi  - registered (publishes since 2026-05-06)
#   - helios-allocator-sdk  - registered (publishes since 2026-05-06)
#   - helios-trader-cli     - registered (publishes since 2026-05-06)
#
# All four packages are now registered. The matrix keeps a `registered:`
# flag per row that toggles `continue-on-error` on the publish step:
# `false` is the default for newly added packages so the workflow stays
# green while a trusted-publisher registration is outstanding; flip to
# `true` once the entry is live so the publish becomes a real gate.

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Publish ${{ matrix.dist }} to test-PyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ matrix.dist }}
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    strategy:
      fail-fast: false
      matrix:
        include:
          - dist: helios-strategy-sdk
            dir: packages/strategy-sdk
            registered: true
          - dist: helios-contracts-abi
            dir: packages/contracts-abi-py
            registered: true
          - dist: helios-allocator-sdk
            dir: packages/allocator-sdk
            registered: true
          - dist: helios-trader-cli
            dir: packages/helios-cli
            registered: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        env:
          GH_REF: ${{ github.ref }}
          PKG_DIR: ${{ matrix.dir }}
        run: |
          tag="${GH_REF#refs/tags/sdk-v}"
          pyproject_version=$(uv run --no-project python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('${PKG_DIR}/pyproject.toml').read_text())['project']['version'])")
          echo "tag=$tag pyproject=$pyproject_version"
          if [ "$tag" != "$pyproject_version" ]; then
            echo "::error::tag sdk-v$tag does not match ${PKG_DIR} pyproject version $pyproject_version"
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build --package ${{ matrix.dist }} --sdist --wheel --out-dir dist

      - name: Publish to test-PyPI
        continue-on-error: ${{ !matrix.registered }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
