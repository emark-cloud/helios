name: publish-sdk-testpypi

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build & publish helios-strategy-sdk to test-PyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/helios-strategy-sdk
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        env:
          GH_REF: ${{ github.ref }}
        run: |
          tag="${GH_REF#refs/tags/sdk-v}"
          pyproject_version=$(uv run --no-project python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('packages/strategy-sdk/pyproject.toml').read_text())['project']['version'])")
          echo "tag=$tag pyproject=$pyproject_version"
          if [ "$tag" != "$pyproject_version" ]; then
            echo "::error::tag sdk-v$tag does not match pyproject version $pyproject_version"
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build --package helios-strategy-sdk --sdist --wheel --out-dir dist

      - name: Publish to test-PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
