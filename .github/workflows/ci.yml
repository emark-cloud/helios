name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'contracts/**'
              - 'circuits/**'
              - 'services/**'
              - 'reference-strategies/**'
              - 'packages/**'
              - 'scripts/**'
              - 'subgraph/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - 'packages/contracts-abi/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'

  contracts:
    name: contracts (foundry)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        id: foundry-install
        uses: foundry-rs/foundry-toolchain@v1
        continue-on-error: true
        with:
          version: stable
      - name: Install Foundry (retry on flake)
        if: steps.foundry-install.outcome == 'failure'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      # uv + Python are needed for the ClassIds parity test (vm.ffi shells
      # out to oracle.poseidon to verify the Solidity constants match the
      # canonical Python Poseidon hash). Foundry tests can't auto-skip
      # vm.ffi calls, so the deps must be present in this job.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          # Phase-3 review MEDIUM: cache the uv-resolved venv across
          # PRs so each job doesn't re-resolve the workspace.
          enable-cache: true
      - name: uv sync (oracle for ClassIds parity)
        working-directory: .
        run: uv sync --all-packages --all-extras
      # The Python Poseidon helper (oracle.poseidon) shells out to
      # services/oracle/scripts/poseidon_helper.js (circomlibjs), which
      # vm.ffi tests in test/ClassIds.t.sol invoke. Need node_modules
      # in this job too, not just the python job.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install poseidon helper node deps
        working-directory: services/oracle/scripts
        run: npm install --no-audit --no-fund
      - name: Check formatting
        run: forge fmt --check
      - name: Build
        run: forge build --sizes
      - name: Test
        run: forge test -vv
      - name: Coverage gate (>=85% lines on Phase 1 contracts)
        run: |
          set -euo pipefail
          OUTPUT=$(forge coverage --no-match-coverage "(script|test)/" --report summary)
          echo "$OUTPUT"
          LINES=$(echo "$OUTPUT" \
            | awk -F '|' '/^\| Total/ { gsub(/[ %]/, "", $3); sub(/\(.*/, "", $3); print $3 }')
          echo "Aggregate line coverage: ${LINES}%"
          awk -v c="$LINES" 'BEGIN { exit !(c+0 >= 85.0) }'

  circuits:
    name: circuits (circom + snarkjs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install circom 2.1.9
        run: |
          curl -L https://github.com/iden3/circom/releases/download/v2.1.9/circom-linux-amd64 -o /usr/local/bin/circom
          chmod +x /usr/local/bin/circom
          circom --version
      - name: Install snarkjs
        run: npm install -g snarkjs@0.7.6
      - name: Install circuits deps
        run: npm install --no-audit --no-fund
        working-directory: circuits
      - name: Build + verify hello circuit
        run: make test
        working-directory: circuits

  frontend:
    name: frontend + packages (ts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Phase-3 review MEDIUM: install pnpm BEFORE setup-node@v4 so
      # `cache: pnpm` can locate the store and key on
      # `pnpm-lock.yaml`. Speeds up cold-start by ~40% on cache hit.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install Foundry (for ABI artifacts)
        id: foundry-install
        uses: foundry-rs/foundry-toolchain@v1
        continue-on-error: true
        with:
          version: stable
      - name: Install Foundry (retry on flake)
        if: steps.foundry-install.outcome == 'failure'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile
      - name: Build contracts
        run: forge build
        working-directory: contracts
      - name: Generate ABI bindings
        run: pnpm --filter @helios/contracts-abi build
      - name: Typecheck TS workspaces
        run: pnpm --if-present -r typecheck
      - name: Lint frontend
        run: pnpm --filter @helios/frontend lint
      - name: Build frontend
        run: pnpm --filter @helios/frontend build

  python:
    name: python (uv + ruff + pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          # Phase-3 review MEDIUM: cache the uv-resolved venv across
          # PRs so each job doesn't re-resolve the workspace.
          enable-cache: true
      - name: uv sync
        run: uv sync --all-packages --all-extras
      # The oracle.poseidon Python wrapper spawns
      # services/oracle/scripts/poseidon_helper.js (circomlibjs). Tests
      # under reference-strategies/yield_rotation_v1/ that exercise the
      # Poseidon parity vectors fail without these node_modules.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install poseidon helper node deps
        run: npm install --no-audit --no-fund
        working-directory: services/oracle/scripts
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pyright
        run: uv run pyright
      - name: Pytest
        run: uv run pytest

  frontend-e2e:
    name: frontend e2e (playwright /audit snapshots)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install Foundry (for ABI artifacts)
        id: foundry-install
        uses: foundry-rs/foundry-toolchain@v1
        continue-on-error: true
        with:
          version: stable
      - name: Install Foundry (retry on flake)
        if: steps.foundry-install.outcome == 'failure'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile
      - name: Build contracts
        run: forge build
        working-directory: contracts
      - name: Generate ABI bindings
        run: pnpm --filter @helios/contracts-abi build
      - name: Resolve Playwright version
        id: pw
        run: |
          VERSION=$(node -p "require('./frontend/node_modules/@playwright/test/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright browsers
        run: pnpm --filter @helios/frontend exec playwright install --with-deps chromium
      - name: Run frontend e2e
        run: pnpm --filter @helios/frontend test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore
