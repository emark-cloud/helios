[project]
name = "helios-strategy-sdk"
version = "0.1.0"
description = "Helios strategy SDK — implement StrategyAgent, ship a trading strategy on the Helios marketplace."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Team Helios" }]
keywords = ["helios", "trading", "kite", "zk", "agent"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "pydantic>=2.9",
    "httpx>=0.27",
    "structlog>=24.4",
    "web3>=7.4",
    "eth-account>=0.13",
    # Note: BN254 Poseidon is shipped as `helios._vendor.circomlibpy`
    # (MIT, see vendor LICENSE) rather than as a PyPI dep — upstream
    # over-pins `requires-python>=3.12` and the rest of the workspace
    # targets 3.11. The wrapper at `helios.poseidon` is the only
    # supported entry point.
]

[project.urls]
Homepage = "https://github.com/akinleyeemmanuel97/helios"
Repository = "https://github.com/akinleyeemmanuel97/helios"
Documentation = "https://github.com/akinleyeemmanuel97/helios/blob/main/Helios.md"

[project.optional-dependencies]
dev = ["pytest>=8.3", "pytest-asyncio>=0.24", "ruff>=0.8", "pyright>=1.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helios"]
