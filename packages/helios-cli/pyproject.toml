[project]
name = "helios-cli"
version = "0.1.0"
description = "Helios CLI — backtest, deploy, simulate, manage stake. Wraps both the strategy and allocator SDKs."
requires-python = ">=3.11"
dependencies = [
    "helios-strategy-sdk",
    "helios-allocator-sdk",
    "helios-contracts-abi",
    "typer>=0.13",
    "rich>=13.9",
    "httpx>=0.27",
    "web3>=7.4",
    "eth-account>=0.13",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "ruff>=0.8", "pyright>=1.1"]

[tool.hatch.build.targets.wheel.force-include]
"src/helios_cli/templates" = "helios_cli/templates"

[project.scripts]
helios = "helios_cli:app_main"
"helios-allocator" = "helios_cli.allocator:app_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helios_cli"]
