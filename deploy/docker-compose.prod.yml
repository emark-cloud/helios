# Helios production stack — Servarica Montreal box.
#
# Layout assumptions (set by deploy/bootstrap.sh):
#   /srv/helios/app   = git checkout of this repo
#   /srv/helios/data  = persistent volumes
#   /srv/helios/.env  = production secrets (NEVER committed)
#
# Run via:  pm2 start /srv/helios/app/deploy/ecosystem.config.cjs
# Or directly: cd /srv/helios/app && docker compose -f deploy/docker-compose.prod.yml up -d
#
# Phase 0 status:
#   Postgres + Redis + prover are live.
#   Python services are commented out — Phase 1 un-comments each as it earns
#   real behavior. `python.Dockerfile` already supports them; just need the
#   per-service Dockerfile shims under services/<name>/Dockerfile.

name: helios

x-restart: &restart unless-stopped
x-loopback: &loopback "127.0.0.1"

services:
  postgres:
    image: postgres:16-alpine
    restart: *restart
    environment:
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in /srv/helios/.env}
      POSTGRES_DB: helios
    volumes:
      - /srv/helios/data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helios"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: *restart
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /srv/helios/data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"

  prover:
    build:
      context: ..
      dockerfile: deploy/services/node.Dockerfile
      args:
        SERVICE_DIR: services/prover
    image: helios/prover:latest
    restart: *restart
    environment:
      PROVER_HTTP_PORT: "8004"
      LOG_LEVEL: info
    volumes:
      # NOTE: bind-mounted from /srv/helios/circuits-build (helios-owned) rather
      # than the repo path `../circuits/build`. The repo's `circuits/build/`
      # directory was created as root by docker on first compose-up when the
      # mount target needed a directory to exist, and we lost passwordless sudo
      # so we can't chown it. Populate `/srv/helios/circuits-build/` by rsyncing
      # the artifacts from a dev host (see deploy/README.md WS9 follow-up).
      # Phase-2 follow-up: drop this mount entirely once artifacts are COPY'd
      # into the prover image at build time.
      - /srv/helios/circuits-build:/app/circuits/build:ro
    ports:
      - "127.0.0.1:8004:8004"
    depends_on:
      - redis
    # Phase-3 review MEDIUM: snarkjs proof generation can hang on a
    # malformed witness or a leaked file descriptor; without a
    # healthcheck Docker has no signal to recycle the container — the
    # event loop just stops draining requests. `/health` is a cheap
    # in-process route in services/prover/src/index.js. Three failures
    # at 30s intervals give us a 90-second worst-case detection window
    # before the container restarts.
    healthcheck:
      # node:bookworm-slim ships neither wget nor curl. Use the runtime's
      # built-in fetch — the prover is already a Node 20 service, so this
      # adds no dependency. CMD form avoids shell-escaping pitfalls.
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:8004/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Python services ──────────────────────────────────────
  # Each one builds from python.Dockerfile with its package + module args.
  # helix + bot stay commented (post-hackathon scope per project memory).

  # http_host defaults to "0.0.0.0" and http_port defaults to the
  # canonical per-service port via _template.config.BaseServiceSettings,
  # so neither needs to be set explicitly here. Override via env_file
  # using the service's prefix (e.g. SENTINEL_HTTP_PORT) when needed.

  sentinel:
    build:
      context: ..
      dockerfile: deploy/services/python.Dockerfile
      args:
        SERVICE_PACKAGE: helios-sentinel
        SERVICE_MODULE: sentinel
    image: helios/sentinel:latest
    restart: *restart
    env_file: /srv/helios/.env
    environment:
      DATABASE_URL: postgres://helios:${POSTGRES_PASSWORD}@postgres:5432/helios
    # Public-bind 8001 so the Vercel-side `/api/sentinel/[...path]`
    # proxy can reach this service over the public IP. Sentinel is
    # write-once-per-(user,nonce); the on-chain UserVault is the
    # authoritative trust anchor, so a public REST surface is OK
    # for the testnet demo. Re-front with nginx + TLS once a domain
    # is ready (deploy/nginx/sentinel.conf, deploy/setup-tls.sh).
    ports: ["0.0.0.0:8001:8001"]
    depends_on: [postgres, redis, prover]

  reputation:
    build:
      context: ..
      dockerfile: deploy/services/python.Dockerfile
      args: { SERVICE_PACKAGE: helios-reputation, SERVICE_MODULE: reputation }
    image: helios/reputation:latest
    restart: *restart
    env_file: /srv/helios/.env
    environment:
      DATABASE_URL: postgres://helios:${POSTGRES_PASSWORD}@postgres:5432/helios
    ports: ["127.0.0.1:8002:8002"]
    depends_on: [postgres]

  oracle:
    build:
      context: ..
      dockerfile: deploy/services/python.Dockerfile
      args: { SERVICE_PACKAGE: helios-oracle, SERVICE_MODULE: oracle }
    image: helios/oracle:latest
    restart: *restart
    env_file: /srv/helios/.env
    ports: ["127.0.0.1:8003:8003"]

  # ── Reference strategy runtimes ──────────────────────────
  # Each runtime polls the oracle, builds a Poseidon witness, asks the
  # prover for a Groth16 proof, and submits `executeWithProof` against
  # its strategy vault. The `[service]` extra pulls in the FastAPI
  # runner (helios-service-template, workspace-only).

  momentum_v1:
    build:
      context: ..
      dockerfile: deploy/services/python.Dockerfile
      args:
        SERVICE_PACKAGE: helios-reference-momentum-v1
        SERVICE_MODULE: momentum_v1
        SERVICE_EXTRA: service
    image: helios/momentum_v1:latest
    restart: *restart
    env_file: /srv/helios/.env
    environment:
      ORACLE_ENDPOINT: http://oracle:8003
      PROVER_ENDPOINT: http://prover:8004
      # Phase-6: each strategy runs its own vault. The shared .env carries
      # the per-class proxies under MOMENTUM_/MEAN_REV_/YIELD_ROTATION_
      # prefixes; the per-service STRATEGY_VAULT_ADDRESS read by the
      # runtime executor is explicitly mapped here so all three runtimes
      # share one .env file without colliding on the same key.
      STRATEGY_VAULT_ADDRESS: ${MOMENTUM_STRATEGY_VAULT_ADDRESS}
      # WS9 #9: per-class navOracle key — each Phase-6 base vault was
      # init'd with `navOracle = operator`, so the EIP-712 NAV
      # signature must come from the same dedicated key. Without
      # this override every NAV signature would still recover to
      # the deployer (the previous shared key) and reportNAV would
      # revert NavSignatureInvalid.
      NAV_ORACLE_PK: ${MOMENTUM_NAV_ORACLE_PK}
    ports: ["127.0.0.1:8005:8005"]
    depends_on: [oracle, prover]

  mean_reversion_v1:
    build:
      context: ..
      dockerfile: deploy/services/python.Dockerfile
      args:
        SERVICE_PACKAGE: helios-reference-mean-reversion-v1
        SERVICE_MODULE: mean_reversion_v1
        SERVICE_EXTRA: service
    image: helios/mean_reversion_v1:latest
    restart: *restart
    env_file: /srv/helios/.env
    environment:
      ORACLE_ENDPOINT: http://oracle:8003
      PROVER_ENDPOINT: http://prover:8004
      STRATEGY_VAULT_ADDRESS: ${MEAN_REV_STRATEGY_VAULT_ADDRESS}
      NAV_ORACLE_PK: ${MEAN_REV_NAV_ORACLE_PK}
    ports: ["127.0.0.1:8006:8006"]
    depends_on: [oracle, prover]

  yield_rotation_v1:
    build:
      context: ..
      dockerfile: deploy/services/python.Dockerfile
      args:
        SERVICE_PACKAGE: helios-reference-yield-rotation-v1
        SERVICE_MODULE: yield_rotation_v1
        SERVICE_EXTRA: service
    image: helios/yield_rotation_v1:latest
    restart: *restart
    env_file: /srv/helios/.env
    environment:
      ORACLE_ENDPOINT: http://oracle:8003
      PROVER_ENDPOINT: http://prover:8004
      STRATEGY_VAULT_ADDRESS: ${YIELD_ROTATION_STRATEGY_VAULT_ADDRESS}
    ports: ["127.0.0.1:8007:8007"]
    depends_on: [oracle, prover]

  # --- CXR — remote-chain strategy runtimes (§12.1 venue routing) ---
  # Each service reuses the same image as its Kite counterpart but
  # overrides KITE_RPC_URL / KITE_CHAIN_ID / STRATEGY_REGISTRY /
  # STRATEGY_VAULT_ADDRESS to point at the remote-chain proxies.
  # The `KITE_` prefix is a historical artefact of the template
  # settings — the field is "execution-chain RPC", not Kite-specific.

  yield_rotation_v1_arb:
    image: helios/yield_rotation_v1:latest
    restart: *restart
    env_file: /srv/helios/.env
    environment:
      ORACLE_ENDPOINT: http://oracle:8003
      PROVER_ENDPOINT: http://prover:8004
      KITE_RPC_URL: ${ARBITRUM_SEPOLIA_RPC_URL}
      KITE_CHAIN_ID: 421614
      STRATEGY_REGISTRY: ${YIELD_ROTATION_ARB_STRATEGY_REGISTRY}
      STRATEGY_VAULT_ADDRESS: ${YIELD_ROTATION_ARB_STRATEGY_VAULT_ADDRESS}
      YIELD_ROT_VENUE_KIND: aave_v3
      YIELD_ROT_LENDING_POOL_ADDRESS: ${YIELD_ROTATION_ARB_LENDING_POOL_ADDRESS}
      ALLOCATOR_ADDRESS: ${YIELD_ROTATION_ARB_ALLOCATOR_ADDRESS}
    ports: ["127.0.0.1:8017:8007"]
    depends_on: [oracle, prover]

  momentum_v1_base:
    image: helios/momentum_v1:latest
    restart: *restart
    env_file: /srv/helios/.env
    environment:
      ORACLE_ENDPOINT: http://oracle:8003
      PROVER_ENDPOINT: http://prover:8004
      KITE_RPC_URL: ${BASE_SEPOLIA_RPC_URL}
      KITE_CHAIN_ID: 84532
      STRATEGY_REGISTRY: ${MOMENTUM_BASE_STRATEGY_REGISTRY}
      STRATEGY_VAULT_ADDRESS: ${MOMENTUM_BASE_STRATEGY_VAULT_ADDRESS}
      ALLOCATOR_ADDRESS: ${MOMENTUM_BASE_ALLOCATOR_ADDRESS}
      NAV_ORACLE_PK: ${MOMENTUM_BASE_NAV_ORACLE_PK}
    ports: ["127.0.0.1:8015:8005"]
    depends_on: [oracle, prover]

  mean_reversion_v1_base:
    image: helios/mean_reversion_v1:latest
    restart: *restart
    env_file: /srv/helios/.env
    environment:
      ORACLE_ENDPOINT: http://oracle:8003
      PROVER_ENDPOINT: http://prover:8004
      KITE_RPC_URL: ${BASE_SEPOLIA_RPC_URL}
      KITE_CHAIN_ID: 84532
      STRATEGY_REGISTRY: ${MEAN_REV_BASE_STRATEGY_REGISTRY}
      STRATEGY_VAULT_ADDRESS: ${MEAN_REV_BASE_STRATEGY_VAULT_ADDRESS}
      ALLOCATOR_ADDRESS: ${MEAN_REV_BASE_ALLOCATOR_ADDRESS}
      NAV_ORACLE_PK: ${MEAN_REV_BASE_NAV_ORACLE_PK}
    ports: ["127.0.0.1:8016:8006"]
    depends_on: [oracle, prover]

  # helix:    # deferred post-hackathon (regime/correlation scope cut)
  # bot:      # deferred post-hackathon (Telegram bot scope cut)
