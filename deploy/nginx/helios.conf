# Helios reverse proxy.
#
# Drop into /etc/nginx/sites-available/helios.conf, symlink into sites-enabled,
# then `sudo nginx -t && sudo systemctl reload nginx`.
#
# Phase 0 ships an HTTP-only config. Phase 6 adds TLS via certbot — at that
# point this file gets a `listen 443 ssl http2;` block and an HTTP→HTTPS redirect.
#
# Per-route rate limits keep the prover from being trivially DoS-able and
# protect the allocator REST endpoints from runaway clients.

# ── Rate limit zones ──────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=helios_default:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=helios_prover:10m  rate=4r/s;   # proof gen is expensive
limit_req_zone $binary_remote_addr zone=helios_dashboard:10m rate=10r/s;

# ── Upstreams (Docker Compose binds to 127.0.0.1) ─────────────
upstream helios_sentinel    { server 127.0.0.1:8001; keepalive 16; }
upstream helios_reputation  { server 127.0.0.1:8002; keepalive 16; }
upstream helios_oracle      { server 127.0.0.1:8003; keepalive 16; }
upstream helios_prover      { server 127.0.0.1:8004; keepalive 4;  }
upstream helios_bot         { server 127.0.0.1:8005; keepalive 8;  }

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Logs land in /var/log/nginx/. Rotated by Ubuntu's default logrotate.
    access_log /var/log/nginx/helios.access.log;
    error_log  /var/log/nginx/helios.error.log warn;

    # Hide nginx version
    server_tokens off;
    include /etc/nginx/snippets/helios-security-headers.conf;

    # Gzip text payloads (JSON dashboards, subgraph responses)
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types application/json application/javascript text/css text/plain;

    # Reasonable proxy defaults for FastAPI behind nginx
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_read_timeout 60s;

    # ── Health (no rate limit) ────────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Sentinel (allocator REST + WS) ────────────────────────
    location /v1/ {
        limit_req zone=helios_dashboard burst=20 nodelay;
        proxy_pass http://helios_sentinel;
    }

    # WebSocket events
    location /v1/users/ {
        limit_req zone=helios_dashboard burst=20 nodelay;
        proxy_pass http://helios_sentinel;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1h;
    }

    # ── Reputation engine ─────────────────────────────────────
    location /reputation/ {
        limit_req zone=helios_default burst=10 nodelay;
        proxy_pass http://helios_reputation/;
    }

    # ── Oracle ────────────────────────────────────────────────
    location /oracle/ {
        limit_req zone=helios_default burst=20 nodelay;
        proxy_pass http://helios_oracle/;
    }

    # ── Prover (tight limit — Groth16 is expensive) ───────────
    location /prove {
        limit_req zone=helios_prover burst=2 nodelay;
        proxy_pass http://helios_prover;
        proxy_read_timeout 30s;
        client_max_body_size 1m;
    }

    # ── Default ───────────────────────────────────────────────
    location / {
        return 404 '{"error":"not_found"}';
        add_header Content-Type application/json;
    }
}
