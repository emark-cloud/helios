# Helios reverse proxy.
#
# Drop into /etc/nginx/sites-available/helios.conf, symlink into sites-enabled,
# then `sudo nginx -t && sudo systemctl reload nginx`.
#
# TLS is on by default. Provision with `sudo deploy/setup-tls.sh <fqdn>` —
# the script runs `certbot --nginx` and edits this file's `server_name`
# directives in place. Do not deploy without TLS: dashboard, prover, oracle,
# and reputation traffic all carries user / signer secrets.
#
# Per-route rate limits keep the prover from being trivially DoS-able and
# protect the allocator REST endpoints from runaway clients.

# ── Rate limit zones ──────────────────────────────────────────
# Phase 6 spec (TODO.md line 475): 100 req/min reads, 10 req/min writes
# per IP, with a tighter limit on the prover (Groth16 is expensive). We
# split reads vs writes by HTTP method via a $request_method map so a
# single location { } can apply both bounds; empty-string keys disable
# the rate-limit for non-matching requests (nginx native behaviour).
map $request_method $rate_limit_write_key {
    default $binary_remote_addr;
    GET     "";
    HEAD    "";
    OPTIONS "";
}

map $request_method $rate_limit_read_key {
    default "";
    GET     $binary_remote_addr;
    HEAD    $binary_remote_addr;
    OPTIONS $binary_remote_addr;
}

limit_req_zone $rate_limit_read_key  zone=helios_read:10m   rate=100r/m;
limit_req_zone $rate_limit_write_key zone=helios_write:10m  rate=10r/m;
limit_req_zone $binary_remote_addr   zone=helios_prover:10m rate=5r/m;  # proof gen is expensive

# Surface 429 (not 503) when a client trips the rate limit so SDK clients
# can back off correctly.
limit_req_status 429;

# ── Upstreams (Docker Compose binds to 127.0.0.1) ─────────────
upstream helios_sentinel    { server 127.0.0.1:8001; keepalive 16; }
upstream helios_reputation  { server 127.0.0.1:8002; keepalive 16; }
upstream helios_oracle      { server 127.0.0.1:8003; keepalive 16; }
upstream helios_prover      { server 127.0.0.1:8004; keepalive 4;  }
upstream helios_bot         { server 127.0.0.1:8005; keepalive 8;  }

# ── HTTP → HTTPS redirect ─────────────────────────────────────
# Port 80 only serves the ACME challenge (so certbot can auto-renew) and
# a 301 to the HTTPS host. Everything else is unreachable in plaintext.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    # `setup-tls.sh` rewrites `_` to the deployed FQDN.
    server_name _;

    # Cert paths are the certbot --nginx default. setup-tls.sh edits these
    # in place if the deployer chose a non-default fqdn / cert dir.
    ssl_certificate     /etc/letsencrypt/live/HELIOS_FQDN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/HELIOS_FQDN/privkey.pem;

    # Modern profile from Mozilla's SSL Configuration Generator (intermediate).
    # TLS 1.2 + 1.3 only — TLS 1.0/1.1 are off in the OpenSSL build but pinned
    # here for defense in depth.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 2 years HSTS with preload — only switch on after a successful TLS
    # cutover; reverting is hard once browsers have cached this header.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Logs land in /var/log/nginx/. Rotated by Ubuntu's default logrotate.
    access_log /var/log/nginx/helios.access.log;
    error_log  /var/log/nginx/helios.error.log warn;

    # Hide nginx version
    server_tokens off;
    include /etc/nginx/snippets/helios-security-headers.conf;

    # Gzip text payloads (JSON dashboards, subgraph responses)
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types application/json application/javascript text/css text/plain;

    # Reasonable proxy defaults for FastAPI behind nginx
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_read_timeout 60s;

    # ── Health (no rate limit) ────────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Sentinel (allocator REST + WS) ────────────────────────
    # GET/HEAD/OPTIONS hit helios_read (100 r/min); POST/PUT/PATCH/DELETE
    # (e.g. /v1/onboard, allocator command surfaces) hit helios_write
    # (10 r/min). Burst tolerates short legitimate spikes; nodelay rejects
    # excess immediately rather than queuing.
    location /v1/ {
        limit_req zone=helios_read  burst=20 nodelay;
        limit_req zone=helios_write burst=3  nodelay;
        proxy_pass http://helios_sentinel;
    }

    # WebSocket events. The upgrade handshake is a GET so it lands in the
    # read zone; the long-lived connection itself is unmetered.
    location /v1/users/ {
        limit_req zone=helios_read burst=20 nodelay;
        proxy_pass http://helios_sentinel;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1h;
    }

    # ── Reputation engine ─────────────────────────────────────
    # Read-mostly: judges + frontend pulling scores. Signer-side writes
    # are gated by EIP-712 sig verification at the application layer.
    location /reputation/ {
        limit_req zone=helios_read  burst=20 nodelay;
        limit_req zone=helios_write burst=2  nodelay;
        proxy_pass http://helios_reputation/;
    }

    # ── Oracle ────────────────────────────────────────────────
    # Same pattern as reputation: read-mostly, signer writes auth'd at
    # the app layer.
    location /oracle/ {
        limit_req zone=helios_read  burst=20 nodelay;
        limit_req zone=helios_write burst=2  nodelay;
        proxy_pass http://helios_oracle/;
    }

    # ── Prover (tight limit — Groth16 is expensive) ───────────
    # 5 r/min per IP, burst 1 to absorb a single retry. Proof generation
    # takes 5–15s; a sustained higher rate is always abuse.
    location /prove {
        limit_req zone=helios_prover burst=1 nodelay;
        proxy_pass http://helios_prover;
        proxy_read_timeout 30s;
        client_max_body_size 1m;
    }

    # ── Default ───────────────────────────────────────────────
    location / {
        return 404 '{"error":"not_found"}';
        add_header Content-Type application/json;
    }
}
