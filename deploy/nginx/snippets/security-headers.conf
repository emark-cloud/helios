# Security headers — included from helios.conf.
# Symlink target: /etc/nginx/snippets/helios-security-headers.conf

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
# CSP is intentionally permissive here (API server, no HTML). The frontend
# (Vercel) sets its own CSP appropriate to Next.js.
add_header X-Robots-Tag "noindex, nofollow" always;
